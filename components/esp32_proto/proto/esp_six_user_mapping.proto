syntax = "proto3";

package com.six.iot;

enum SixConfigStatus {
    Success = 0;
    InvalidParam = 1;
    InvalidState = 2;
}

message CmdSetUserMapping {
    string Challenge = 1;
}
message RespSetUserMapping {
    SixConfigStatus Status = 1;
    string NodeId = 2;
    string ProductId = 3;
    string Challenge = 4;
    string Signature = 5;
}

enum SixConfigMsgType {
    TypeCmdSetUserMapping = 0;
    TypeRespSetUserMapping = 1;
}

message SixConfigPayload {
    SixConfigMsgType msg = 1;
    oneof payload {
    CmdSetUserMapping cmd_set_user_mapping = 10;
    RespSetUserMapping resp_set_user_mapping = 11;
    }
}
